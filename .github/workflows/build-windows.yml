name: Build Windows

# Produces a portable one-folder app and an Inno Setup installer as artifacts.
# Run manually (Actions ▸ Build Windows ▸ Run workflow) or on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests

      - name: Build app (PyInstaller)
        run: pyinstaller packaging/DSI_Redline.spec --noconfirm

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: DSI-Redline-portable
          path: "dist/DSI Redline/**"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DSI-Redline-installer
          path: "dist_installer/*.exe"
